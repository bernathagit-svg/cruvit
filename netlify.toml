[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions.plant-knowledge]
  timeout = 26

[functions.plant-identify]
  timeout = 45

[functions.claude]
  timeout = 30

[functions.garden-weather]
  timeout = 20

[functions.gd-claude]
  timeout = 26

[functions.gd-stability]
  timeout = 26

[functions.gd-replicate]
  timeout = 26

[functions.gd-replicate-inpaint]
  timeout = 26

[functions.gd-openai-image]
  timeout = 26

[functions.pd-claude]
  timeout = 30

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Cache-Control, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Max-Age = "86400"
