<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cruvit — Plant Identity Resolver Tests (standalone, read-only)</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 24px; max-width: 960px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.sub { margin: 0 0 16px; opacity: .7; }
  #summary { font-weight: 600; padding: 10px 14px; border-radius: 8px; margin: 12px 0; }
  #summary.ok { background: #e7f6ec; color: #1c6b39; }
  #summary.fail { background: #fdecec; color: #a01818; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid rgba(128,128,128,.25); vertical-align: top; }
  td.status { font-weight: 600; white-space: nowrap; }
  td.pass { color: #1c6b39; }
  td.fail { color: #a01818; }
  code { background: rgba(128,128,128,.15); padding: 1px 4px; border-radius: 4px; }
  small { opacity: .7; }
</style>
</head>
<body>
  <h1>Plant Identity Resolver — standalone test harness</h1>
  <p class="sub">Read-only. Loads <code>../data/plant-identity.registry.json</code> and
  <code>../modules/identity/plant-identity-resolver.js</code>. No runtime wiring, no writes.</p>
  <div id="summary">Running…</div>
  <table id="results"><thead><tr><th>#</th><th>Test</th><th>Result</th><th>Detail</th></tr></thead><tbody></tbody></table>

<script type="module">
import { createPlantIdentityResolver, loadIdentityRegistry, resolvePlantIdentity, getIdentityResolverStatus }
  from '../modules/identity/plant-identity-resolver.js';

/* Shared, environment-agnostic test suite. Returns {results, summary}. */
export function runResolverTests({ registryData, createPlantIdentityResolver, loadIdentityRegistry, resolvePlantIdentity }) {
  const results = [];
  const R = createPlantIdentityResolver(registryData);
  const rec = (name, pass, detail) => results.push({ name, pass: !!pass, detail: detail || '' });
  const eq = (a, b) => a === b;

  const check = (name, res, exp) => {
    const problems = [];
    for (const k of Object.keys(exp)) {
      if (k === 'conflictSlug') { if (!res.conflict || res.conflict.slug !== exp[k]) problems.push(`conflict.slug=${res.conflict && res.conflict.slug}≠${exp[k]}`); continue; }
      if (!eq(res[k], exp[k])) problems.push(`${k}=${JSON.stringify(res[k])}≠${JSON.stringify(exp[k])}`);
    }
    rec(name, problems.length === 0, problems.length ? problems.join(', ') : `status=${res.status} plantId=${res.plantId} canon=${res.canonicalSlug} by=${res.matchedBy}`);
  };

  // 1. exact canonical slug WITH id
  check('exact canonical slug with id (apple)', R.resolve('apple'),
    { status: 'resolved_id', plantId: 'plt_465b6lc4cnrarxaa', canonicalSlug: 'apple', matchedBy: 'canonicalSlug', needsReview: false, confidence: 'exact' });
  // 2. exact canonical slug WITHOUT id
  check('exact canonical slug without id (almond)', R.resolve('almond'),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'almond', needsReview: false });
  // 3. apple-tree alias -> apple + id
  check('alias apple-tree -> apple id', R.resolve('apple-tree'),
    { status: 'resolved_id', plantId: 'plt_465b6lc4cnrarxaa', canonicalSlug: 'apple', matchedBy: 'aliasSlug' });
  // 4. fig-tree alias -> fig + id
  check('alias fig-tree -> fig id', R.resolve('fig-tree'),
    { status: 'resolved_id', plantId: 'plt_5ixjl9fmz1ii2rre', canonicalSlug: 'fig', matchedBy: 'aliasSlug' });
  // 5. mango-tree care key -> mango (no id)
  check('care key mango-tree -> mango', R.resolve('mango-tree'),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'mango', matchedBy: 'moduleKey', inputNamespace: 'careQualityProfiles' });
  // 6. lychee-tree care key -> lychee (no id)
  check('care key lychee-tree -> lychee', R.resolve('lychee-tree'),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'lychee', matchedBy: 'moduleKey', inputNamespace: 'careQualityProfiles' });
  // 7. olive-tree Garden Design key -> olive + id
  check('GD key olive-tree -> olive id', R.resolve('olive-tree'),
    { status: 'resolved_id', plantId: 'plt_e1teyafat3k5i3ke', canonicalSlug: 'olive', matchedBy: 'moduleKey', inputNamespace: 'gardenDesignManifest' });
  // 8. italian-cypress Garden Design key -> cypress (no id)
  check('GD key italian-cypress -> cypress', R.resolve('italian-cypress'),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'cypress', matchedBy: 'moduleKey', inputNamespace: 'gardenDesignManifest' });
  // 9. exact plantId lookup
  check('exact plantId -> olive', R.resolve('plt_e1teyafat3k5i3ke'),
    { status: 'resolved_id', plantId: 'plt_e1teyafat3k5i3ke', canonicalSlug: 'olive', matchedBy: 'plantId' });
  // 10. needsReview identity (agapanthus)
  check('needsReview agapanthus', R.resolve('agapanthus'),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'agapanthus', needsReview: true });
  // 11. avocado identity-layer resolution (no plantId; catalog may still have duplicate rows)
  check('avocado canonical slug → resolved_canonical', R.resolve('avocado'),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'avocado', matchedBy: 'canonicalSlug', needsReview: false, confidence: 'exact', registryVersion: '1.4.0' });
  check('avocado scientific Persea americana → avocado', R.resolve({ scientific: 'Persea americana' }),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'avocado', matchedBy: 'scientificName', confidence: 'high' });
  check('avocado object canonicalSlug hint', R.resolve({ canonicalSlug: 'avocado' }),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'avocado', matchedBy: 'canonicalSlug' });
  check('avocado object profileSlug hint', R.resolve({ profileSlug: 'avocado' }),
    { status: 'resolved_canonical', plantId: null, canonicalSlug: 'avocado', matchedBy: 'canonicalSlug' });
  rec('avocado does not return pending_conflict', R.resolve('avocado').status !== 'pending_conflict',
    'status=' + R.resolve('avocado').status);
  rec('avocado does not fabricate plantId', R.resolve('avocado').plantId === null && R.resolve({ scientific: 'Persea americana' }).plantId === null,
    'slugPid=' + R.resolve('avocado').plantId + ' sciPid=' + R.resolve({ scientific: 'Persea americana' }).plantId);
  {
    const avoIn = { canonicalSlug: 'avocado', keep: true };
    const beforeAvo = JSON.stringify(avoIn);
    const avoRes = R.resolve(avoIn);
    let avoMutBlocked = false;
    try { avoRes.plantId = 'plt_hackavocado000'; avoMutBlocked = (avoRes.plantId === null); } catch (e) { avoMutBlocked = true; }
    rec('avocado result frozen & input unmutated',
      Object.isFrozen(avoRes) && avoMutBlocked && JSON.stringify(avoIn) === beforeAvo && avoRes.canonicalSlug === 'avocado',
      'frozen=' + Object.isFrozen(avoRes) + ' mutBlocked=' + avoMutBlocked + ' inputUntouched=' + (JSON.stringify(avoIn) === beforeAvo));
  }
  // 12. strawberry-guava pending conflict by slug
  check('conflict strawberry-guava (slug)', R.resolve('strawberry-guava'),
    { status: 'pending_conflict', plantId: null, canonicalSlug: null, conflictSlug: 'strawberry-guava' });
  // 13. strawberry-guava accepted spelling
  check('conflict strawberry-guava sci accepted (Psidium cattleianum)', R.resolve({ scientific: 'Psidium cattleianum' }),
    { status: 'pending_conflict', conflictSlug: 'strawberry-guava' });
  // 14. strawberry-guava conflicting spelling
  check('conflict strawberry-guava sci conflicting (Psidium cattleyanum)', R.resolve({ scientific: 'Psidium cattleyanum' }),
    { status: 'pending_conflict', conflictSlug: 'strawberry-guava' });
  // 15. mulberry pending conflict
  check('conflict mulberry (slug)', R.resolve('mulberry'),
    { status: 'pending_conflict', conflictSlug: 'mulberry' });
  check('conflict mulberry scientific Morus spp.', R.resolve({ scientific: 'Morus spp.' }),
    { status: 'pending_conflict', conflictSlug: 'mulberry' });
  // 16. unknown scanned plant (object + string)
  check('provisional unknown object', R.resolve({ name: 'Dragon Tree', slug: 'dragon-tree' }),
    { status: 'provisional', plantId: null, canonicalSlug: null });
  check('provisional unknown scanned slug', R.resolve('dragon-tree'),
    { status: 'provisional', plantId: null, canonicalSlug: null });
  // 17. malformed / empty inputs -> unresolved, no throw
  for (const [label, val] of [['null', null], ['empty string', ''], ['number 42', 42], ['empty object', {}]]) {
    let res, threw = false;
    try { res = R.resolve(val); } catch (e) { threw = true; }
    rec('malformed input: ' + label, !threw && res && res.status === 'unresolved', threw ? 'threw' : `status=${res.status}`);
  }
  // 18a. invalid registry fixture -> degraded resolver
  const bad = createPlantIdentityResolver({ nope: true });
  const badRes = bad.resolve('apple');
  rec('invalid registry fixture -> unresolved+warning', badRes.status === 'unresolved' && badRes.warnings.length > 0 && bad.getStats().valid === false,
    `status=${badRes.status} valid=${bad.getStats().valid} warn=${badRes.warnings.join('|')}`);

  // 19. object hint forms
  check('object hint canonicalSlug', R.resolve({ canonicalSlug: 'apple' }), { status: 'resolved_id', canonicalSlug: 'apple', plantId: 'plt_465b6lc4cnrarxaa' });
  check('object hint profileSlug alias', R.resolve({ profileSlug: 'fig-tree' }), { status: 'resolved_id', canonicalSlug: 'fig', matchedBy: 'aliasSlug' });
  check('object hint plantId', R.resolve({ plantId: 'plt_q9mcjljtt3mofidz' }), { status: 'resolved_id', canonicalSlug: 'japanese-maple', matchedBy: 'plantId' });
  // 20. scientific + common-name exact
  check('scientific exact (Malus domestica) -> apple', R.resolve({ scientific: 'Malus domestica' }), { status: 'resolved_id', canonicalSlug: 'apple', matchedBy: 'scientificName', confidence: 'high' });
  check('common-name token (Japanese Maple) -> japanese-maple', R.resolve('Japanese Maple'), { status: 'resolved_id', canonicalSlug: 'japanese-maple', matchedBy: 'commonName', confidence: 'medium' });

  // 21. coverage counts
  const stats = R.getStats();
  rec('coverage: 75 canonical', stats.canonicalCount === 75, 'canonicalCount=' + stats.canonicalCount);
  rec('coverage: 2 conflicts', stats.conflictCount === 2, 'conflictCount=' + stats.conflictCount);
  rec('coverage: 9 plantId', stats.plantIdCount === 9, 'plantIdCount=' + stats.plantIdCount);
  rec('coverage: registryVersion 1.4.0', R.getRegistryVersion() === '1.4.0', 'version=' + R.getRegistryVersion());
  rec('localized stats: 2 identities / 2 locale blocks / 4 indexed names',
    stats.localizedIdentityCount === 2 && stats.localizedLocaleBlockCount === 2 && stats.localizedIndexedNameCount === 4,
    `id=${stats.localizedIdentityCount} blocks=${stats.localizedLocaleBlockCount} indexed=${stats.localizedIndexedNameCount}`);

  // 21b. Hebrew localized-name pilot (real registry)
  check('Hebrew לבנדר → lavender resolved_id', R.resolve('לבנדר'), {
    status: 'resolved_id', plantId: 'plt_aupnyvawcflgjbyh', canonicalSlug: 'lavender',
    matchedBy: 'localizedName', confidence: 'high', registryVersion: '1.4.0'
  });
  check('Hebrew אזוביון → lavender', R.resolve('אזוביון'), {
    status: 'resolved_id', canonicalSlug: 'lavender', plantId: 'plt_aupnyvawcflgjbyh', matchedBy: 'localizedName'
  });
  check('Hebrew עץ זית → olive resolved_id', R.resolve('עץ זית'), {
    status: 'resolved_id', plantId: 'plt_e1teyafat3k5i3ke', canonicalSlug: 'olive', matchedBy: 'localizedName'
  });
  check('Hebrew זית → olive', R.resolve('זית'), {
    status: 'resolved_id', canonicalSlug: 'olive', plantId: 'plt_e1teyafat3k5i3ke', matchedBy: 'localizedName'
  });
  check('whitespace-normalized Hebrew לבנדר', R.resolve('  לבנדר  '), {
    status: 'resolved_id', canonicalSlug: 'lavender', matchedBy: 'localizedName'
  });
  check('{name:"לבנדר", locale:"he"} exact locale', R.resolve({ name: 'לבנדר', locale: 'he' }), {
    status: 'resolved_id', canonicalSlug: 'lavender', matchedBy: 'localizedName',
    inputNamespace: 'localizedName:he', confidence: 'exact'
  });
  check('{localizedName:"זית", language:"he"}', R.resolve({ localizedName: 'זית', language: 'he' }), {
    status: 'resolved_id', canonicalSlug: 'olive', matchedBy: 'localizedName',
    inputNamespace: 'localizedName:he', confidence: 'exact'
  });
  check('{name:"אזוביון"} without locale', R.resolve({ name: 'אזוביון' }), {
    status: 'resolved_id', canonicalSlug: 'lavender', matchedBy: 'localizedName',
    inputNamespace: 'localizedName:unique-global', confidence: 'high'
  });
  {
    const wrong = R.resolve({ name: 'לבנדר', locale: 'en' });
    rec('wrong locale with unique global exact match',
      wrong.status === 'resolved_id' && wrong.canonicalSlug === 'lavender' && wrong.matchedBy === 'localizedName' &&
      wrong.confidence === 'high' && wrong.inputNamespace === 'localizedName:unique-global' &&
      wrong.warnings.some(w => String(w).startsWith('locale-mismatch:')),
      `status=${wrong.status} ns=${wrong.inputNamespace} conf=${wrong.confidence} warn=${wrong.warnings.join('|')}`);
  }
  {
    const unsup = R.resolve({ name: 'זית', locale: 'xx' });
    rec('unsupported locale with unique global exact match',
      unsup.status === 'resolved_id' && unsup.canonicalSlug === 'olive' && unsup.matchedBy === 'localizedName' &&
      unsup.warnings.some(w => String(w).startsWith('unsupported-locale:')),
      `status=${unsup.status} warn=${unsup.warnings.join('|')}`);
  }
  // precedence: scientific / alias / module still win over localized
  check('scientific precedence unchanged (Malus domestica)', R.resolve({ scientific: 'Malus domestica', name: 'לבנדר' }), {
    status: 'resolved_id', canonicalSlug: 'apple', matchedBy: 'scientificName'
  });
  check('aliasSlug precedence unchanged (apple-tree)', R.resolve({ profileSlug: 'apple-tree', name: 'לבנדר' }), {
    status: 'resolved_id', canonicalSlug: 'apple', matchedBy: 'aliasSlug'
  });
  check('moduleKey precedence unchanged (olive-tree)', R.resolve({ slug: 'olive-tree', name: 'לבנדר' }), {
    status: 'resolved_id', canonicalSlug: 'olive', matchedBy: 'moduleKey'
  });
  // malformed localized inputs do not throw
  for (const [label, val] of [
    ['localizedName nullish object', { localizedName: null, locale: 'he' }],
    ['locale only', { locale: 'he' }],
    ['empty localizedName', { localizedName: '   ', language: 'he' }]
  ]) {
    let res, threw = false;
    try { res = R.resolve(val); } catch (e) { threw = true; }
    rec('malformed localized input no-throw: ' + label, !threw && res && (res.status === 'unresolved' || res.status === 'provisional'),
      threw ? 'threw' : `status=${res && res.status}`);
  }

  // 21c. synthetic localized registries
  {
    const amb = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'plant-a', needsReview: false, localizedNames: { he: { primary: ['שםמשותף'], confidence: 'high', source: 'syn', needsReview: false } } },
        { canonicalSlug: 'plant-b', needsReview: false, localizedNames: { he: { primary: ['שםמשותף'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    const ar = amb.resolve({ name: 'שםמשותף', locale: 'he' });
    rec('synthetic: same localized value → two identities is ambiguous',
      ar.status === 'ambiguous' && ar.plantId === null && ar.canonicalSlug === null && ar.matchedBy === 'localizedName',
      `status=${ar.status} canon=${ar.canonicalSlug}`);
  }
  {
    const dup = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'solo', plantId: 'plt_abcdefghijklmnop', needsReview: false,
          localizedNames: { he: { primary: ['כפול', 'כפול'], aliases: ['כפול'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    const dr = dup.resolve('כפול');
    rec('synthetic: repeated value on same identity still resolves',
      dr.status === 'resolved_id' && dr.canonicalSlug === 'solo' && dr.matchedBy === 'localizedName',
      `status=${dr.status} canon=${dr.canonicalSlug}`);
  }
  {
    const multi = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'shared', needsReview: false,
          localizedNames: {
            en: { primary: ['SharedName'], confidence: 'high', source: 'syn', needsReview: false },
            fr: { primary: ['SharedName'], confidence: 'high', source: 'syn', needsReview: false }
          } }
      ],
      duplicateConflicts: []
    });
    const mr = multi.resolve('SharedName');
    rec('synthetic: same value in two locales → one canonical',
      mr.status === 'resolved_canonical' && mr.canonicalSlug === 'shared' && mr.matchedBy === 'localizedName',
      `status=${mr.status} canon=${mr.canonicalSlug}`);
  }
  {
    const reserved = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'hist-only', needsReview: false,
          localizedNames: { he: {
            primary: ['ראשי'], historical: ['היסטורי'], transliterations: ['histori'],
            misspellings: ['טעות'], deprecated: ['ישן'],
            confidence: 'high', source: 'syn', needsReview: false
          } } }
      ],
      duplicateConflicts: []
    });
    const ok = reserved.resolve('ראשי');
    const skipHist = reserved.resolve('היסטורי');
    const skipTr = reserved.resolve('histori');
    const skipMis = reserved.resolve('טעות');
    const skipDep = reserved.resolve('ישן');
    rec('synthetic: historical/transliteration/misspelling/deprecated not indexed',
      ok.status === 'resolved_canonical' && ok.canonicalSlug === 'hist-only' &&
      skipHist.status === 'provisional' && skipTr.status === 'provisional' &&
      skipMis.status === 'provisional' && skipDep.status === 'provisional',
      `ok=${ok.status} hist=${skipHist.status} tr=${skipTr.status} mis=${skipMis.status} dep=${skipDep.status}`);
  }
  {
    const nr = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'review-me', needsReview: true,
          localizedNames: { he: { primary: ['לבדיקה'], confidence: 'low', source: 'syn', needsReview: true } } }
      ],
      duplicateConflicts: []
    });
    const nrr = nr.resolve('לבדיקה');
    rec('synthetic: localized needsReview propagates; no fabricated plantId',
      nrr.status === 'resolved_canonical' && nrr.canonicalSlug === 'review-me' && nrr.needsReview === true && nrr.plantId === null,
      `status=${nrr.status} needsReview=${nrr.needsReview} plantId=${nrr.plantId}`);
  }
  {
    const malformed = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'ok-plant', needsReview: false, acceptedScientificName: 'Okus plantus',
          localizedNames: 'not-an-object' },
        { canonicalSlug: 'ok-plant-2', needsReview: false,
          localizedNames: { he: null, xx: { primary: ['bad-locale'] },
            en: { primary: ['Good En'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    let threw = false; let r1, r2;
    try { r1 = malformed.resolve('Good En'); r2 = malformed.resolve('bad-locale'); } catch (e) { threw = true; }
    rec('synthetic: malformed localized blocks skipped without throw',
      !threw && r1 && r1.status === 'resolved_canonical' && r1.canonicalSlug === 'ok-plant-2' &&
      r2 && r2.status === 'provisional',
      threw ? 'threw' : `r1=${r1 && r1.status}/${r1 && r1.canonicalSlug} r2=${r2 && r2.status}`);
  }

  // 21d. normalization consistency (locale-independent toLowerCase; script-preserving)
  {
    // Hebrew pilot unchanged after case-folding correction
    check('norm: Hebrew לבנדר still lavender', R.resolve('לבנדר'), {
      status: 'resolved_id', canonicalSlug: 'lavender', matchedBy: 'localizedName'
    });
    check('norm: Hebrew זית still olive', R.resolve('זית'), {
      status: 'resolved_id', canonicalSlug: 'olive', matchedBy: 'localizedName'
    });
    // Ordinary Latin case folding remains exact
    const latin = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'latin-case', needsReview: false,
          localizedNames: { en: { primary: ['Garden Herb'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    check('norm: Latin case folding Garden Herb / GARDEN HERB', latin.resolve('GARDEN HERB'), {
      status: 'resolved_canonical', canonicalSlug: 'latin-case', matchedBy: 'localizedName'
    });
    // Script preservation: Arabic, Cyrillic, CJK, Hindi, Hebrew remain matchable (not stripped)
    const scripts = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'script-ar', needsReview: false,
          localizedNames: { ar: { primary: ['زيتون'], confidence: 'high', source: 'syn', needsReview: false } } },
        { canonicalSlug: 'script-ru', needsReview: false,
          localizedNames: { ru: { primary: ['Лаванда'], confidence: 'high', source: 'syn', needsReview: false } } },
        { canonicalSlug: 'script-zh', needsReview: false,
          localizedNames: { zh: { primary: ['无花果'], confidence: 'high', source: 'syn', needsReview: false } } },
        { canonicalSlug: 'script-hi', needsReview: false,
          localizedNames: { hi: { primary: ['जैतून'], confidence: 'high', source: 'syn', needsReview: false } } },
        { canonicalSlug: 'script-he', needsReview: false,
          localizedNames: { he: { primary: ['בדיקה'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    check('norm: Arabic script preserved', scripts.resolve({ name: 'زيتون', locale: 'ar' }), {
      status: 'resolved_canonical', canonicalSlug: 'script-ar', matchedBy: 'localizedName'
    });
    check('norm: Cyrillic script preserved', scripts.resolve({ name: 'Лаванда', locale: 'ru' }), {
      status: 'resolved_canonical', canonicalSlug: 'script-ru', matchedBy: 'localizedName'
    });
    check('norm: CJK script preserved', scripts.resolve({ name: '无花果', locale: 'zh' }), {
      status: 'resolved_canonical', canonicalSlug: 'script-zh', matchedBy: 'localizedName'
    });
    check('norm: Hindi script preserved', scripts.resolve({ name: 'जैतून', locale: 'hi' }), {
      status: 'resolved_canonical', canonicalSlug: 'script-hi', matchedBy: 'localizedName'
    });
    check('norm: Hebrew script preserved (synthetic)', scripts.resolve({ name: 'בדיקה', locale: 'he' }), {
      status: 'resolved_canonical', canonicalSlug: 'script-he', matchedBy: 'localizedName'
    });
    // Turkish dotted/dotless-I: locale-independent toLowerCase maps ASCII "I"→"i".
    // Forced toLocaleLowerCase("tr") would map "I"→"ı" and miss a registered "i-test".
    // This does NOT claim all Turkish case variants are equivalent — only that en-US/tr
    // locale conversion is not forced.
    const trCase = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'tr-case-probe', needsReview: false,
          localizedNames: { tr: { primary: ['i-test'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    const trRes = trCase.resolve({ name: 'I-TEST', locale: 'tr' });
    const trLocaleForced = typeof 'I'.toLocaleLowerCase === 'function' && 'I'.toLocaleLowerCase('tr') === 'ı';
    rec('norm: Turkish I uses locale-independent lowercasing (I→i, not forced tr/en-US locale)',
      trRes.status === 'resolved_canonical' && trRes.canonicalSlug === 'tr-case-probe' &&
      trRes.matchedBy === 'localizedName' && trLocaleForced === true,
      `status=${trRes.status} canon=${trRes.canonicalSlug} trLocaleI=${'I'.toLocaleLowerCase('tr')} defaultI=${'I'.toLowerCase()}`);
    // Conceptual alignment with validator policy: NFC + trim + whitespace + quotes + toLowerCase
    const quoteSyn = createPlantIdentityResolver({
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'quote-probe', needsReview: false,
          localizedNames: { he: { primary: ["צמח'בדיקה"], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    });
    // Hebrew geresh U+05F3 should fold to ASCII apostrophe like the validator
    const qRes = quoteSyn.resolve('  צמח\u05F3בדיקה  ');
    rec('norm: quote/whitespace policy aligns with validator (geresh→apostrophe, trim/collapse)',
      qRes.status === 'resolved_canonical' && qRes.canonicalSlug === 'quote-probe',
      `status=${qRes.status} canon=${qRes.canonicalSlug}`);
    const mutReg = {
      schemaVersion: 1, registryVersion: '9.9.9',
      canonicalIdentities: [
        { canonicalSlug: 'imut-probe', needsReview: false,
          localizedNames: { ar: { primary: ['زيتون'], confidence: 'high', source: 'syn', needsReview: false } } }
      ],
      duplicateConflicts: []
    };
    const beforeReg = JSON.stringify(mutReg);
    const mutIn = { name: 'زيتون', locale: 'ar', keep: 1 };
    const beforeMut = JSON.stringify(mutIn);
    const mutR = createPlantIdentityResolver(mutReg);
    mutR.resolve(mutIn);
    rec('norm: input and registry remain unmutated',
      JSON.stringify(mutIn) === beforeMut && JSON.stringify(mutReg) === beforeReg &&
      mutR.resolve({ name: 'زيتون', locale: 'ar' }).canonicalSlug === 'imut-probe',
      'inputUntouched=' + (JSON.stringify(mutIn) === beforeMut) +
      ' registryUntouched=' + (JSON.stringify(mutReg) === beforeReg));
  }

  // 22. immutability / no mutation of input or registry
  const beforeRegistry = JSON.stringify(registryData);
  const inputObj = { canonicalSlug: 'apple', extra: 'keep' };
  const r22 = R.resolve(inputObj);
  let frozen = Object.isFrozen(r22);
  let mutationBlocked = false;
  try { r22.plantId = 'plt_hack'; mutationBlocked = (r22.plantId === 'plt_465b6lc4cnrarxaa'); } catch (e) { mutationBlocked = true; }
  const heInput = { name: 'לבנדר', locale: 'he', keep: true };
  const beforeHe = JSON.stringify(heInput);
  const rHe = R.resolve(heInput);
  const heUntouched = JSON.stringify(heInput) === beforeHe;
  const inputUntouched = inputObj.extra === 'keep' && inputObj.canonicalSlug === 'apple';
  const registryUntouched = JSON.stringify(registryData) === beforeRegistry;
  rec('result frozen & input/registry unmutated', frozen && mutationBlocked && inputUntouched && registryUntouched && heUntouched && Object.isFrozen(rHe),
    `frozen=${frozen} mutationBlocked=${mutationBlocked} inputUntouched=${inputUntouched} registryUntouched=${registryUntouched} heUntouched=${heUntouched}`);

  const passed = results.filter(r => r.pass).length;
  return { results, summary: { total: results.length, passed, failed: results.length - passed } };
}

/* Registry-load failure test (uses an injected failing fetch). */
async function runLoaderFailureTest(loadIdentityRegistry, resolvePlantIdentity, getIdentityResolverStatus) {
  const failFetch = async () => { throw new Error('simulated network failure'); };
  const snap = await loadIdentityRegistry({ url: 'data:invalid', fetchImpl: failFetch });
  const status = getIdentityResolverStatus();
  const res = resolvePlantIdentity('apple');
  const pass = snap.status === 'error' && status.status === 'error' && res.status === 'unresolved' && res.warnings.length > 0;
  return { name: 'registry load failure -> status error + unresolved', pass, detail: `loadStatus=${snap.status} resolveStatus=${res.status}` };
}

/* Browser entry point: fetch registry, run suite, render. */
(async () => {
  const summaryEl = document.getElementById('summary');
  const tbody = document.querySelector('#results tbody');
  try {
    const registryData = await fetch('../data/plant-identity.registry.json').then(r => r.json());
    const { results, summary } = runResolverTests({ registryData, createPlantIdentityResolver, loadIdentityRegistry, resolvePlantIdentity });
    const loaderResult = await runLoaderFailureTest(loadIdentityRegistry, resolvePlantIdentity, getIdentityResolverStatus);
    results.push(loaderResult);
    if (loaderResult.pass) summary.passed++; else summary.failed++;
    summary.total++;

    results.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i + 1}</td><td>${r.name}</td>` +
        `<td class="status ${r.pass ? 'pass' : 'fail'}">${r.pass ? 'PASS' : 'FAIL'}</td>` +
        `<td><small>${r.detail}</small></td>`;
      tbody.appendChild(tr);
      console.log(`${r.pass ? 'PASS' : 'FAIL'} — ${r.name}${r.detail ? ' :: ' + r.detail : ''}`);
    });
    const ok = summary.failed === 0;
    summaryEl.className = ok ? 'ok' : 'fail';
    summaryEl.textContent = `${summary.passed}/${summary.total} passed, ${summary.failed} failed`;
    console.log(`SUMMARY: ${summary.passed}/${summary.total} passed, ${summary.failed} failed`);
    // Optional headless reporting hooks — INACTIVE during a normal browser
    // opening. Both the local results beacon and auto-close require an explicit
    // test-mode opt-in via a query flag (?report and/or ?autoclose). No remote
    // host, analytics, credentials, or permanent endpoint: the beacon posts
    // only to the same-origin, throwaway '/__result' sink used by the headless
    // test runner.
    try {
      const params = new URLSearchParams(location.search);
      const testMode = params.has('report') || params.has('autoclose');
      if (testMode && navigator.sendBeacon) navigator.sendBeacon('/__result', JSON.stringify({ results, summary }));
      if (testMode && params.has('autoclose')) setTimeout(() => window.close(), 100);
    } catch (e) {}
  } catch (err) {
    summaryEl.className = 'fail';
    summaryEl.textContent = 'Harness error: ' + (err && err.message || err);
    console.error(err);
  }
})();
</script>
