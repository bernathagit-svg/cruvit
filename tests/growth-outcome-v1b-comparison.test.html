<script type="module">
import {
  evaluateBiologicalGrowthOutcomes,
  evaluateGrowthOutcomeSuitability,
  GROWTH_OUTCOME_NAMES,
  GROWTH_OUTCOME_ENGINE_VERSION
} from '../modules/suitability/growth-outcome-evaluator.js';

const STORAGE_KEY = 'cruvit_mg_v23_real_plant_profiles';
const DETERMINISM_REPEATS = 10;
const FIXTURE_IDS = Object.freeze([
  'untrusted_location_mango',
  'trusted_warm_mango_mature_ornamental',
  'trusted_warm_mango_mature_reliable_yield',
  'florida_young_mango_cold',
  'florida_mature_mango_same_cold'
]);

const ALLOWED_CATEGORIES = Object.freeze([
  'aligned_unknown',
  'gos_preserves_unknown',
  'applicability_difference',
  'blocker_scope_difference',
  'different_question_not_conflict',
  'unresolved_due_missing_input'
]);

const results = [];
const reportLines = [];
const perfSamples = {
  iframeBootstrapMs: [],
  v1bInvokeMs: [],
  gosInvokeMs: [],
  comparisonMs: []
};

function expect(name, pass, detail) {
  results.push({ name: name, pass: !!pass, detail: detail || '' });
}

function logReport(line) {
  reportLines.push(String(line));
}

function json(v) {
  return JSON.stringify(v);
}

function stableStringify(value) {
  if (value === null || typeof value !== 'object') return JSON.stringify(value);
  if (Array.isArray(value)) return '[' + value.map(stableStringify).join(',') + ']';
  const keys = Object.keys(value).sort();
  return '{' + keys.map((k) => JSON.stringify(k) + ':' + stableStringify(value[k])).join(',') + '}';
}

function deepFreeze(value, seen) {
  if (value === null || typeof value !== 'object') return value;
  seen = seen || new WeakSet();
  if (seen.has(value)) return value;
  seen.add(value);
  if (Array.isArray(value)) {
    for (let i = 0; i < value.length; i++) deepFreeze(value[i], seen);
  } else {
    const keys = Object.keys(value);
    for (let i = 0; i < keys.length; i++) deepFreeze(value[keys[i]], seen);
  }
  return Object.freeze(value);
}

function isFrozenDeep(v, seen) {
  seen = seen || new Set();
  if (v === null || typeof v !== 'object') return true;
  if (seen.has(v)) return true;
  seen.add(v);
  if (!Object.isFrozen(v)) return false;
  if (Array.isArray(v)) {
    for (let i = 0; i < v.length; i++) if (!isFrozenDeep(v[i], seen)) return false;
    return true;
  }
  const keys = Object.keys(v);
  for (let i = 0; i < keys.length; i++) if (!isFrozenDeep(v[keys[i]], seen)) return false;
  return true;
}

function median(arr) {
  if (!arr.length) return null;
  const a = arr.slice().sort((x, y) => x - y);
  const m = Math.floor(a.length / 2);
  return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2;
}

function clone(v) {
  return JSON.parse(JSON.stringify(v));
}

function snapshotStorage() {
  const ls = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    ls[k] = localStorage.getItem(k);
  }
  const ss = {};
  for (let i = 0; i < sessionStorage.length; i++) {
    const k = sessionStorage.key(i);
    ss[k] = sessionStorage.getItem(k);
  }
  return {
    localStorage: ls,
    sessionStorage: ss,
    cookie: String(document.cookie || '')
  };
}

function restoreStorage(snap) {
  localStorage.clear();
  Object.keys(snap.localStorage).forEach((k) => localStorage.setItem(k, snap.localStorage[k]));
  sessionStorage.clear();
  Object.keys(snap.sessionStorage).forEach((k) => sessionStorage.setItem(k, snap.sessionStorage[k]));
}

function storageEquals(a, b) {
  return stableStringify(a.localStorage) === stableStringify(b.localStorage)
    && stableStringify(a.sessionStorage) === stableStringify(b.sessionStorage)
    && String(a.cookie) === String(b.cookie);
}

function waitFor(predicate, timeoutMs) {
  const start = performance.now();
  return new Promise((resolve) => {
    function tick() {
      let ok = false;
      try { ok = !!predicate(); } catch (e) { ok = false; }
      if (ok) return resolve(true);
      if (performance.now() - start > timeoutMs) return resolve(false);
      setTimeout(tick, 40);
    }
    tick();
  });
}

function evidenceByIdFromDoc(doc) {
  const map = {};
  (doc.evidence || []).forEach((e) => { map[e.evidenceId] = e; });
  return map;
}

function profileBySlug(doc, slug) {
  return (doc.profiles || []).find((p) => p.canonicalSlug === slug);
}

function fixtureRegionTokensFromProfile(profile) {
  const tags = [];
  const values = (profile.regionApplicability && profile.regionApplicability.values) || [];
  values.forEach((v) => tags.push(String(v).toLowerCase()));
  const notes = String((profile.regionApplicability && profile.regionApplicability.notes) || '').toLowerCase();
  if (notes.indexOf('florida') >= 0) tags.push('florida');
  if (notes.indexOf('subtropical') >= 0) tags.push('subtropical');
  if (notes.indexOf('mediterranean') >= 0) tags.push('mediterranean');
  return Array.from(new Set(tags));
}

function normalizeV1b(raw) {
  const r = raw || {};
  const factors = r.factors && typeof r.factors === 'object' ? {
    survival: r.factors.survival == null ? null : Number(r.factors.survival),
    thrive: r.factors.thrive == null ? null : Number(r.factors.thrive),
    heatCold: r.factors.heatCold == null ? null : Number(r.factors.heatCold),
    humidity: r.factors.humidity == null ? null : Number(r.factors.humidity),
    scanFit: r.factors.scanFit == null ? null : Number(r.factors.scanFit)
  } : { survival: null, thrive: null, heatCold: null, humidity: null, scanFit: null };
  const blocks = Array.isArray(r.blocks)
    ? r.blocks.map((b) => String(b).trim()).filter(Boolean).sort()
    : [];
  return {
    engineVersion: String(r.engineVersion || ''),
    score: r.score == null ? null : Number(r.score),
    level: String(r.level || ''),
    factors: factors,
    blockIds: blocks,
    dataSource: String(r.dataSource || ''),
    plantSlug: String(r.plantSlug || '')
  };
}

function normalizeGosOutcome(o) {
  const x = o || {};
  return {
    level: x.level,
    confidence: x.confidence,
    dataStatus: x.dataStatus,
    blockers: (x.blockers || []).slice().sort(),
    limitingFactors: (x.limitingFactors || []).slice().sort(),
    favorableFactors: (x.favorableFactors || []).slice().sort(),
    evidenceRefsUsed: (x.evidenceRefsUsed || []).slice().sort(),
    evidenceRefsExcluded: (x.evidenceRefsExcluded || []).map((e) => {
      if (e && typeof e === 'object') {
        return { evidenceId: e.evidenceId || null, reason: e.reason || null, ruleId: e.ruleId || null, mode: e.mode || null };
      }
      return { evidenceId: String(e), reason: null, ruleId: null, mode: null };
    }).sort((a, b) => stableStringify(a).localeCompare(stableStringify(b))),
    missingInputs: (x.missingInputs || []).slice().sort(),
    dependencyCaps: (x.dependencyCaps || []).slice().sort(),
    internalScore: x.internalScore
  };
}

function normalizeGos(full, biological) {
  const bio = biological || full;
  const outcomes = {};
  GROWTH_OUTCOME_NAMES.forEach((name) => {
    outcomes[name] = normalizeGosOutcome(bio.outcomes && bio.outcomes[name]);
  });
  return {
    engineVersion: String(full.engineVersion || bio.engineVersion || ''),
    evaluationStatus: String(bio.evaluationStatus || ''),
    locationStatus: String(bio.locationStatus || ''),
    outcomes: outcomes,
    missingInputs: (bio.missingInputs || []).slice().sort(),
    goalFit: full.goalFit ? clone(full.goalFit) : null,
    recommendedUse: (full.recommendedUse || []).slice().sort(),
    overallConclusion: full.overallConclusion || null,
    warnings: (full.warnings || []).slice().sort()
  };
}

function classifyComparison(fixtureId, v1bN, gosN, gosBioN) {
  const categories = [];
  let trustedLocationParity = 'n/a';
  let broadSurvivalDirection = 'incomparable';
  let unknownPreservation = 'n/a';
  let reproductiveDetail = 'n/a';
  let regionalApplicabilityDifference = false;
  let cultivarApplicabilityDifference = false;
  let blockerDifference = 'n/a';
  const notableAgreements = [];
  const notableDifferences = [];
  const unresolvedQuestions = [];

  const v1bUntrusted = v1bN.level === 'unknown' && v1bN.score === null && v1bN.dataSource === 'location_untrusted';
  const gosBlocked = gosN.evaluationStatus === 'blocked_untrusted_location'
    && GROWTH_OUTCOME_NAMES.every((n) => gosN.outcomes[n].level === 'unknown');

  if (fixtureId === 'untrusted_location_mango') {
    trustedLocationParity = (v1bUntrusted && gosBlocked) ? 'both_blocked' : 'mismatch';
    broadSurvivalDirection = (v1bUntrusted && gosBlocked) ? 'aligned' : 'incomparable';
    unknownPreservation = 'both_unknown';
    categories.push('aligned_unknown');
    if (v1bUntrusted && gosBlocked) notableAgreements.push('untrusted_location_blocks_both');
    else notableDifferences.push('untrusted_parity_failed');
  } else {
    trustedLocationParity = 'both_trusted';
    broadSurvivalDirection = 'incomparable';
    const laterUnknown = ['flowering', 'fruitSet', 'fruitRipeningOrYield', 'longTermReliability']
      .some((n) => gosBioN.outcomes[n].level === 'unknown');
    if (laterUnknown && v1bN.level !== 'unknown' && v1bN.score != null) {
      unknownPreservation = 'gos_preserves';
      categories.push('gos_preserves_unknown');
      notableDifferences.push('gos_later_stage_unknown_while_v1b_scored');
    } else if (laterUnknown) {
      unknownPreservation = 'gos_preserves';
      categories.push('gos_preserves_unknown');
    }
    categories.push('different_question_not_conflict');
    notableAgreements.push('engines_answer_different_questions');
  }

  if (fixtureId === 'florida_young_mango_cold' || fixtureId === 'florida_mature_mango_same_cold') {
    categories.push('applicability_difference');
    regionalApplicabilityDifference = true;
    const youngBlock = (gosBioN.outcomes.survival.blockers || []).indexOf('mango_surv_young_freeze_kill') >= 0;
    if (fixtureId === 'florida_young_mango_cold' && youngBlock) {
      categories.push('blocker_scope_difference');
      blockerDifference = 'scope';
      notableDifferences.push('gos_age_specific_survival_blocker_vs_v1b_species_heuristic');
    }
    if (fixtureId === 'florida_mature_mango_same_cold' && !youngBlock) {
      categories.push('applicability_difference');
      notableDifferences.push('gos_young_blocker_not_applied_for_mature');
      notableDifferences.push('v1b_does_not_model_plant_age');
    }
  }

  const unique = [];
  categories.forEach((c) => {
    if (ALLOWED_CATEGORIES.indexOf(c) >= 0 && unique.indexOf(c) < 0) unique.push(c);
  });
  if (!unique.length) {
    unique.push('unresolved_due_missing_input');
    unresolvedQuestions.push('no_allowed_category_matched');
  }

  const banned = /gos better|v1b wrong|preferred engine|replacement|winner/i;
  const textBlob = unique.concat(notableAgreements, notableDifferences, unresolvedQuestions).join(' ');
  if (banned.test(textBlob)) {
    unresolvedQuestions.push('banned_winner_language_detected');
  }

  return {
    trustedLocationParity: trustedLocationParity,
    broadSurvivalDirection: broadSurvivalDirection,
    confidenceDifference: 'incomparable',
    unknownPreservation: unknownPreservation,
    reproductiveDetail: reproductiveDetail,
    regionalApplicabilityDifference: regionalApplicabilityDifference,
    cultivarApplicabilityDifference: cultivarApplicabilityDifference,
    blockerDifference: blockerDifference,
    primaryCategory: unique[0],
    secondaryCategories: unique.slice(1),
    notableAgreements: notableAgreements.sort(),
    notableDifferences: notableDifferences.sort(),
    unresolvedQuestions: unresolvedQuestions.sort()
  };
}

function buildComparisonObject(fixtureId, plantIdentity, locationContext, v1bN, gosN, gosBioN, meta) {
  const comparison = classifyComparison(fixtureId, v1bN, gosN, gosBioN);
  return deepFreeze({
    fixtureId: fixtureId,
    plantIdentity: plantIdentity,
    locationContext: locationContext,
    normalizedV1b: v1bN,
    normalizedGos: gosN,
    biologicalGos: gosBioN,
    comparison: comparison,
    meta: meta
  });
}

function installPostReadyIframeGuards(cw, weatherKind) {
  const forbiddenHits = [];
  const origFetch = cw.fetch.bind(cw);
  cw.fetch = async function (input, init) {
    const url = typeof input === 'string' ? input : (input && input.url) || '';
    const u = String(url);
    if (/growth-outcome-pilot\/(evidence|profiles)\.json|modules\/suitability\/growth-outcome-evaluator\.js/i.test(u)) {
      forbiddenHits.push(u);
      throw new Error('Forbidden GOS resource requested by iframe: ' + u);
    }
    if (/garden-weather/i.test(u)) {
      const fixed = fixedWeatherPayload(weatherKind);
      const body = JSON.stringify(fixed);
      return new cw.Response(body, { status: 200, headers: { 'Content-Type': 'application/json' } });
    }
    return origFetch(input, init);
  };
  return {
    forbiddenHits: function () { return forbiddenHits.slice(); }
  };
}

function destroyIframe(iframe) {
  if (!iframe) return;
  try {
    if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
  } catch (e) {}
}

async function createReadyIframe(weatherKind) {
  const host = document.getElementById('frameHost');
  const iframe = document.createElement('iframe');
  iframe.title = 'gos3c0-v1b';
  const t0 = performance.now();
  const loadPromise = new Promise((resolve, reject) => {
    iframe.addEventListener('load', () => resolve(), { once: true });
    iframe.addEventListener('error', () => reject(new Error('iframe load error')), { once: true });
  });
  iframe.src = '../index.html?gos3c0=' + encodeURIComponent(String(Date.now()));
  host.appendChild(iframe);
  await loadPromise;
  const cw = iframe.contentWindow;
  const ready = await waitFor(() => {
    return cw
      && typeof cw.evaluateClimateSuitabilityV1 === 'function'
      && typeof cw.setAppLocation === 'function'
      && typeof cw.getAppLocation === 'function'
      && typeof cw.hasTrustedAppLocation === 'function'
      && typeof cw.clearAppLocation === 'function';
  }, 30000);
  const bootstrapMs = performance.now() - t0;
  perfSamples.iframeBootstrapMs.push(bootstrapMs);
  if (!ready) {
    destroyIframe(iframe);
    throw new Error('iframe APIs not ready (evaluateClimateSuitabilityV1/setAppLocation/getAppLocation/hasTrustedAppLocation)');
  }
  // Post-ready only — do not wrap fetch during bootstrap.
  const guards = installPostReadyIframeGuards(cw, weatherKind || 'warm');
  // Resource audit after bootstrap: iframe must not have loaded GOS assets.
  let resourceHits = [];
  try {
    const entries = cw.performance && cw.performance.getEntriesByType
      ? cw.performance.getEntriesByType('resource')
      : [];
    resourceHits = entries.map((e) => String(e.name || '')).filter((n) =>
      /growth-outcome-pilot\/(evidence|profiles)\.json|modules\/suitability\/growth-outcome-evaluator\.js/i.test(n)
    );
  } catch (e) {
    resourceHits = [];
  }
  return { iframe: iframe, cw: cw, guards: guards, resourceHits: resourceHits, bootstrapMs: bootstrapMs };
}

async function ensureUntrusted(cw) {
  if (cw.hasTrustedAppLocation()) {
    await cw.clearAppLocation();
  }
  // clearAppLocation sets source:default → untrusted
  return cw.hasTrustedAppLocation() === false;
}

async function ensureTrustedWarm(cw) {
  await cw.setAppLocation({
    label: 'Miami, Florida, USA',
    climate: 'Tropical',
    lat: 25.7617,
    lon: -80.1918,
    country: 'United States',
    countryCode: 'US',
    source: 'manual',
    rawInput: 'Miami, Florida'
  });
  return cw.hasTrustedAppLocation() === true;
}

async function ensureTrustedFlorida(cw) {
  await cw.setAppLocation({
    label: 'Homestead, Florida, USA',
    climate: 'Subtropical',
    lat: 25.4687,
    lon: -80.4776,
    country: 'United States',
    countryCode: 'US',
    source: 'manual',
    rawInput: 'Homestead, Florida'
  });
  return cw.hasTrustedAppLocation() === true;
}

function runGosForFixture(fixtureId, mango, evidenceById) {
  const regionTags = fixtureRegionTokensFromProfile(mango);
  const baseGarden = {
    growingSystem: 'ground',
    protectedOutdoor: false,
    sunExposure: 'full',
    pollinizerAvailable: null,
    contextTags: ['outdoor', 'home-landscape']
  };

  if (fixtureId === 'untrusted_location_mango') {
    const locationClimate = {
      trusted: false,
      latitude: null,
      longitude: null,
      regionTags: [],
      climateTags: [],
      hemisphere: 'northern',
      locationConfidence: 'default',
      climateConfidence: 'none',
      values: {}
    };
    const plantContext = { cultivar: 'unknown', ageClass: 'unknown', propagation: 'unknown', contextTags: [] };
    const t0 = performance.now();
    const biological = evaluateBiologicalGrowthOutcomes({
      profile: mango,
      evidenceById: evidenceById,
      locationClimate: locationClimate,
      gardenContext: baseGarden,
      plantContext: plantContext
    });
    const full = evaluateGrowthOutcomeSuitability({
      profile: mango,
      evidenceById: evidenceById,
      locationClimate: locationClimate,
      gardenContext: baseGarden,
      plantContext: plantContext,
      userGoal: 'ornamentalFoliage'
    });
    perfSamples.gosInvokeMs.push(performance.now() - t0);
    return {
      full: full,
      biological: biological,
      locationContext: { trusted: false, broadClimate: null, freezingRisk: null, regionTags: [], notes: 'untrusted' },
      inputsFrozenCheck: { locationClimate: locationClimate, gardenContext: baseGarden, plantContext: plantContext }
    };
  }

  if (fixtureId === 'trusted_warm_mango_mature_ornamental' || fixtureId === 'trusted_warm_mango_mature_reliable_yield') {
    const locationClimate = {
      trusted: true,
      latitude: 25.7617,
      longitude: -80.1918,
      regionTags: regionTags,
      climateTags: ['tropical', 'subtropical'],
      hemisphere: 'northern',
      locationConfidence: 'high',
      climateConfidence: 'medium',
      structuralFreezingRisk: 'low',
      isFrostFreeGrowingClimate: true,
      values: { minimumTemperatureF: 50, frostExposureHours: 0 }
    };
    const plantContext = { cultivar: 'unknown', ageClass: 'mature', propagation: 'unknown', contextTags: [] };
    const goal = fixtureId === 'trusted_warm_mango_mature_reliable_yield'
      ? 'reliableHouseholdYield'
      : 'ornamentalFoliage';
    const t0 = performance.now();
    const biological = evaluateBiologicalGrowthOutcomes({
      profile: mango,
      evidenceById: evidenceById,
      locationClimate: locationClimate,
      gardenContext: baseGarden,
      plantContext: plantContext
    });
    const full = evaluateGrowthOutcomeSuitability({
      profile: mango,
      evidenceById: evidenceById,
      locationClimate: locationClimate,
      gardenContext: baseGarden,
      plantContext: plantContext,
      userGoal: goal
    });
    perfSamples.gosInvokeMs.push(performance.now() - t0);
    return {
      full: full,
      biological: biological,
      locationContext: {
        trusted: true,
        broadClimate: 'tropical',
        freezingRisk: 'low',
        regionTags: regionTags.slice().sort(),
        notes: 'trusted_warm_mango'
      },
      inputsFrozenCheck: { locationClimate: locationClimate, gardenContext: baseGarden, plantContext: plantContext }
    };
  }

  // Florida cold fixtures D/E
  const locationClimate = {
    trusted: true,
    latitude: 25.4687,
    longitude: -80.4776,
    regionTags: ['florida', 'subtropical'],
    climateTags: ['subtropical', 'florida'],
    hemisphere: 'northern',
    locationConfidence: 'high',
    climateConfidence: 'medium',
    structuralFreezingRisk: 'medium',
    isFrostFreeGrowingClimate: false,
    values: { minimumTemperatureF: 29.5, frostExposureHours: 3 }
  };
  const plantContext = {
    cultivar: 'unknown',
    ageClass: fixtureId === 'florida_young_mango_cold' ? 'young' : 'mature',
    propagation: 'unknown',
    contextTags: []
  };
  const t0 = performance.now();
  const biological = evaluateBiologicalGrowthOutcomes({
    profile: mango,
    evidenceById: evidenceById,
    locationClimate: locationClimate,
    gardenContext: baseGarden,
    plantContext: plantContext
  });
  const full = evaluateGrowthOutcomeSuitability({
    profile: mango,
    evidenceById: evidenceById,
    locationClimate: locationClimate,
    gardenContext: baseGarden,
    plantContext: plantContext,
    userGoal: 'ornamentalFoliage'
  });
  perfSamples.gosInvokeMs.push(performance.now() - t0);
  return {
    full: full,
    biological: biological,
    locationContext: {
      trusted: true,
      broadClimate: 'subtropical',
      freezingRisk: 'medium',
      regionTags: ['florida', 'subtropical'],
      notes: fixtureId
    },
    inputsFrozenCheck: { locationClimate: locationClimate, gardenContext: baseGarden, plantContext: plantContext }
  };
}

async function runSingleComparison(fixtureId, mango, evidenceById, profileDoc, evidenceDoc) {
  const weatherKind = (fixtureId.indexOf('florida_') === 0) ? 'florida_cold' : 'warm';
  let iframe = null;
  const tComp0 = performance.now();
  try {
    const ready = await createReadyIframe(weatherKind);
    iframe = ready.iframe;
    const cw = ready.cw;
    expect('iframe bootstrap resources exclude GOS (' + fixtureId + ')', ready.resourceHits.length === 0,
      ready.resourceHits.join(',') || 'none');

    if (fixtureId === 'untrusted_location_mango') {
      const untrusted = await ensureUntrusted(cw);
      expect('untrusted gate for ' + fixtureId, untrusted, 'hasTrusted=' + cw.hasTrustedAppLocation());
      const loc = cw.getAppLocation();
      expect('DEFAULT/Western Galilee not trusted', cw.hasTrustedAppLocation() === false
        && (String(loc.source || '').toLowerCase() === 'default' || loc.confirmationStatus === 'default'),
        'source=' + loc.source + ' status=' + loc.confirmationStatus);
    } else if (fixtureId.indexOf('florida_') === 0) {
      const trusted = await ensureTrustedFlorida(cw);
      expect('trusted Florida location for ' + fixtureId, trusted);
    } else {
      const trusted = await ensureTrustedWarm(cw);
      expect('trusted warm location for ' + fixtureId, trusted);
    }

    const tV0 = performance.now();
    const v1bRaw = cw.evaluateClimateSuitabilityV1('mango', { indoorShelter: false });
    perfSamples.v1bInvokeMs.push(performance.now() - tV0);
    const v1bN = normalizeV1b(v1bRaw);

    const inputSnapshot = {};
    const gosPack = runGosForFixture(fixtureId, mango, evidenceById);
    inputSnapshot.before = stableStringify(gosPack.inputsFrozenCheck);
    const gosN = normalizeGos(gosPack.full, gosPack.biological);
    const gosBioN = normalizeGos(gosPack.biological, gosPack.biological);
    // Strip goal fields from biological normalization for bio identity checks
    gosBioN.goalFit = null;
    gosBioN.recommendedUse = [];
    gosBioN.overallConclusion = null;
    gosBioN.warnings = (gosPack.biological.warnings || []).slice().sort();
    inputSnapshot.after = stableStringify(gosPack.inputsFrozenCheck);

    expect('GOS inputs unchanged (' + fixtureId + ')', inputSnapshot.before === inputSnapshot.after);
    expect('GOS full deeply frozen (' + fixtureId + ')', isFrozenDeep(gosPack.full));
    expect('GOS biological deeply frozen (' + fixtureId + ')', isFrozenDeep(gosPack.biological));

    const meta = {
      gosEngineVersion: GROWTH_OUTCOME_ENGINE_VERSION,
      v1bEngineVersion: 'v1b',
      profileVersion: mango.profileVersion || null,
      evidenceDataVersion: evidenceDoc.dataVersion || null,
      profilesSchemaVersion: profileDoc.schemaVersion || null,
      fixtureVersion: 'gos-3c0-0.1.0'
    };
    const plantIdentity = {
      canonicalSlug: 'mango',
      catalogSlug: 'mango',
      plantId: mango.plantId || null
    };
    const comparisonObj = buildComparisonObject(
      fixtureId, plantIdentity, gosPack.locationContext, v1bN, gosN, gosBioN, meta
    );
    expect('comparison deeply frozen (' + fixtureId + ')', isFrozenDeep(comparisonObj));
    expect('no winner language (' + fixtureId + ')',
      !/gos better|v1b wrong|preferred engine|replacement|winner/i.test(stableStringify(comparisonObj.comparison)));

    expect('post-ready forbidden GOS fetches (' + fixtureId + ')',
      ready.guards.forbiddenHits().length === 0,
      ready.guards.forbiddenHits().join(',') || 'none');

    // Clear confirmed location inside iframe lifecycle before destroy.
    if (cw.hasTrustedAppLocation && cw.hasTrustedAppLocation()) {
      await cw.clearAppLocation();
    }
    expect('iframe location untrusted before destroy (' + fixtureId + ')', cw.hasTrustedAppLocation() === false);

    perfSamples.comparisonMs.push(performance.now() - tComp0);
    return {
      fixtureId: fixtureId,
      normalizedV1b: v1bN,
      normalizedGos: gosN,
      biologicalGos: gosBioN,
      comparison: comparisonObj.comparison,
      comparisonObj: comparisonObj
    };
  } finally {
    destroyIframe(iframe);
  }
}

async function inventoryV1bFromSource(indexText) {
  const levels = [];
  const levelFromScore = indexText.match(/function climateSuitabilityV1LevelFromScore[\s\S]*?^}/m);
  const levelTokens = ['notRecommended', 'unknown', 'risky', 'possible', 'good', 'excellent'];
  levelTokens.forEach((t) => {
    if (new RegExp("'" + t + "'|\"" + t + "\"").test(indexText) && levels.indexOf(t) < 0) levels.push(t);
  });
  const scoreNull = [];
  if (/score:\s*null/.test(indexText) && /location_untrusted/.test(indexText)) {
    scoreNull.push('hasTrustedAppLocation_false → score null, level unknown, dataSource location_untrusted');
  }
  if (/if\(!plant\)/.test(indexText)) {
    scoreNull.push('missing plant → score null, level unknown');
  }
  if (/blocks\.length&&strictBlocks/.test(indexText)) {
    scoreNull.push('strictBlocks with blocks → score 0 (not null), level notRecommended');
  }
  const frost = [];
  if (/climateSuitabilityV1HighFrostNeedsConservativeClimate/.test(indexText)) {
    frost.push('high frost-sensitive + non-frost-free → factor penalties + level cap risky|possible');
  }
  if (/Frost risk is too high for this plant/.test(indexText)) {
    frost.push('high frostSensitivity + freezingRisk!==low + !indoorShelter → hard block');
  }
  if (/tropical-frost-sensitive-fruit/.test(indexText)) {
    frost.push('tropical-frost-sensitive-fruit group participates in frost caps/blocks');
  }
  return {
    levels: levels,
    scoreNullConditions: scoreNull,
    frostCapOrBlock: frost,
    untrustedResult: {
      level: 'unknown',
      score: null,
      dataSource: 'location_untrusted'
    }
  };
}

function finish(okLabel) {
  const passed = results.filter((r) => r.pass).length;
  const failed = results.length - passed;
  const host = document.getElementById('summary');
  host.textContent = 'SUMMARY: ' + passed + '/' + results.length + ' passed, ' + failed + ' failed · ' + okLabel;
  host.className = failed ? 'fail' : 'pass';
  document.getElementById('rows').innerHTML = results.map((r) =>
    '<tr><td class="' + (r.pass ? 'pass' : 'fail') + '">' + (r.pass ? 'PASS' : 'FAIL') +
    '</td><td>' + r.name + '</td><td>' + String(r.detail || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</td></tr>'
  ).join('');
  document.getElementById('report').textContent = reportLines.join('\n');
  window.__GOS3C0_DONE = true;
  window.__GOS3C0_SUMMARY = {
    total: results.length,
    passed: passed,
    failed: failed,
    ready: failed === 0,
    recommendation: failed === 0 ? 'READY_FOR_FULL_GOS_3C' : 'NOT_READY'
  };
  window.__GOS3C0_PERF = {
    iframeBootstrapMedianMs: median(perfSamples.iframeBootstrapMs),
    v1bInvokeMedianMs: median(perfSamples.v1bInvokeMs),
    gosInvokeMedianMs: median(perfSamples.gosInvokeMs),
    comparisonMedianMs: median(perfSamples.comparisonMs)
  };
  window.__GOS3C0_REPORT = reportLines.slice();
}

async function main() {
  const harnessStart = performance.now();
  const initialSnap = snapshotStorage();
  let recommendation = 'NOT_READY';
  try {
    expect('no window GOS evaluator global',
      typeof window.evaluateGrowthOutcomeSuitability === 'undefined'
      && typeof window.CruvitGrowthOutcomeEvaluator === 'undefined');

    // Parent-only pilot/evaluator loads
    const evidenceDoc = await fetch('../data/growth-outcome-pilot/evidence.json').then((r) => r.json());
    const profileDoc = await fetch('../data/growth-outcome-pilot/profiles.json').then((r) => r.json());
    const evidenceById = evidenceByIdFromDoc(evidenceDoc);
    const mango = profileBySlug(profileDoc, 'mango');
    expect('pilot mango profile loaded in parent', !!mango);

    const indexText = await fetch('../index.html').then((r) => r.text());
    expect('index.html has no GOS evaluator import',
      !/growth-outcome-evaluator/.test(indexText)
      && !/modules\/suitability\/growth-outcome/.test(indexText));
    expect('index.html has no pilot evidence/profiles path',
      !/growth-outcome-pilot\/evidence\.json/.test(indexText)
      && !/growth-outcome-pilot\/profiles\.json/.test(indexText));
    expect('Smart Rec path has no GOS call',
      !/evaluateGrowthOutcomeSuitability|evaluateBiologicalGrowthOutcomes|interpretGrowthOutcomesForGoal/.test(indexText));
    expect('no GOS↔v1b score bridge tokens',
      !/gosToV1b|v1bToGos|growthOutcomeScore|bridgeGrowthOutcome/i.test(indexText));

    const inventory = await inventoryV1bFromSource(indexText);
    logReport('=== v1b level inventory (from live index.html source) ===');
    logReport('levels: ' + json(inventory.levels));
    logReport('scoreNullConditions:');
    inventory.scoreNullConditions.forEach((x) => logReport('  - ' + x));
    logReport('frostCapOrBlock:');
    inventory.frostCapOrBlock.forEach((x) => logReport('  - ' + x));
    logReport('untrustedResult: ' + json(inventory.untrustedResult));
    logReport('cross-engine risk-band mapping: DEFERRED (not invented in GOS-3C0)');
    logReport('behavioral Smart Recommendations comparison: DEFERRED (no stable SR API without app-state mutation)');
    expect('v1b levels include unknown and excellent..notRecommended',
      inventory.levels.indexOf('unknown') >= 0
      && inventory.levels.indexOf('notRecommended') >= 0
      && inventory.levels.indexOf('excellent') >= 0);

    const fixtureResults = {};
    const firstPassByFixture = {};

    for (let f = 0; f < FIXTURE_IDS.length; f++) {
      const fixtureId = FIXTURE_IDS[f];
      const repeats = [];
      for (let i = 0; i < DETERMINISM_REPEATS; i++) {
        restoreStorage(initialSnap);
        expect('cookie unchanged before repeat ' + fixtureId + '#' + i,
          String(document.cookie || '') === initialSnap.cookie);
        const once = await runSingleComparison(fixtureId, mango, evidenceById, profileDoc, evidenceDoc);
        repeats.push({
          v1b: once.normalizedV1b,
          gos: once.normalizedGos,
          bio: once.biologicalGos,
          comparison: once.comparison
        });
        // Restore after every fixture iteration (also in finally of whole main).
        restoreStorage(initialSnap);
        expect('storage restored after ' + fixtureId + '#' + i, storageEquals(snapshotStorage(), initialSnap));
      }

      const base = repeats[0];
      let allV1b = true;
      let allGos = true;
      let allCmp = true;
      for (let i = 1; i < repeats.length; i++) {
        if (stableStringify(repeats[i].v1b) !== stableStringify(base.v1b)) allV1b = false;
        if (stableStringify(repeats[i].gos) !== stableStringify(base.gos)) allGos = false;
        if (stableStringify(repeats[i].comparison) !== stableStringify(base.comparison)) allCmp = false;
      }
      expect('determinism x' + DETERMINISM_REPEATS + ' v1b (' + fixtureId + ')', allV1b);
      expect('determinism x' + DETERMINISM_REPEATS + ' gos (' + fixtureId + ')', allGos);
      expect('determinism x' + DETERMINISM_REPEATS + ' comparison (' + fixtureId + ')', allCmp);
      logReport('determinism ' + fixtureId + ': v1b=' + allV1b + ' gos=' + allGos + ' comparison=' + allCmp);
      logReport('  v1b=' + stableStringify(base.v1b));
      logReport('  gos.eval=' + base.gos.evaluationStatus + ' survival=' + base.gos.outcomes.survival.level
        + ' blockers=' + json(base.gos.outcomes.survival.blockers));
      logReport('  primaryCategory=' + base.comparison.primaryCategory
        + ' secondary=' + json(base.comparison.secondaryCategories));

      fixtureResults[fixtureId] = base;
      firstPassByFixture[fixtureId] = base;
    }

    // Fixture-specific semantic assertions (from last deterministic baseline)
    const A = fixtureResults.untrusted_location_mango;
    expect('A v1b unknown/null/location_untrusted',
      A.v1b.level === 'unknown' && A.v1b.score === null && A.v1b.dataSource === 'location_untrusted',
      json(A.v1b));
    expect('A GOS blocked_untrusted_location', A.gos.evaluationStatus === 'blocked_untrusted_location');
    expect('A all six unknown', GROWTH_OUTCOME_NAMES.every((n) => A.gos.outcomes[n].level === 'unknown'));
    expect('A parity both_blocked', A.comparison.trustedLocationParity === 'both_blocked');
    expect('A primary aligned_unknown', A.comparison.primaryCategory === 'aligned_unknown');

    const B = fixtureResults.trusted_warm_mango_mature_ornamental;
    const C = fixtureResults.trusted_warm_mango_mature_reliable_yield;
    expect('B v1b scored (trusted)', B.v1b.score != null && B.v1b.level !== '' && B.v1b.dataSource !== 'location_untrusted',
      json(B.v1b));
    expect('B/C v1b byte-identical', stableStringify(B.v1b) === stableStringify(C.v1b));
    expect('B/C biological GOS byte-identical', stableStringify(B.bio.outcomes) === stableStringify(C.bio.outcomes)
      && B.bio.evaluationStatus === C.bio.evaluationStatus);
    expect('B/C goal fields may differ',
      stableStringify(B.gos.goalFit) !== stableStringify(C.gos.goalFit)
      || stableStringify(B.gos.recommendedUse) !== stableStringify(C.gos.recommendedUse)
      || B.gos.overallConclusion !== C.gos.overallConclusion);
    expect('B broadSurvivalDirection incomparable', B.comparison.broadSurvivalDirection === 'incomparable');
    expect('B uses allowed category only',
      ALLOWED_CATEGORIES.indexOf(B.comparison.primaryCategory) >= 0);

    const D = fixtureResults.florida_young_mango_cold;
    const E = fixtureResults.florida_mature_mango_same_cold;
    expect('D young blocker present or deferred evidence captured',
      (D.gos.outcomes.survival.blockers || []).indexOf('mango_surv_young_freeze_kill') >= 0
      || (D.gos.outcomes.survival.level === 'notRecommended'),
      'level=' + D.gos.outcomes.survival.level + ' blockers=' + json(D.gos.outcomes.survival.blockers));
    expect('E young blocker absent',
      (E.gos.outcomes.survival.blockers || []).indexOf('mango_surv_young_freeze_kill') < 0,
      json(E.gos.outcomes.survival.blockers));
    expect('D/E v1b may be identical (no age model)', true,
      'v1bEqual=' + (stableStringify(D.v1b) === stableStringify(E.v1b)));
    expect('E has applicability_difference',
      E.comparison.primaryCategory === 'applicability_difference'
      || (E.comparison.secondaryCategories || []).indexOf('applicability_difference') >= 0
      || (E.comparison.secondaryCategories || []).indexOf('different_question_not_conflict') >= 0
      || E.comparison.primaryCategory === 'different_question_not_conflict');

    // Final storage / cookie / location proof
    restoreStorage(initialSnap);
    const finalSnap = snapshotStorage();
    expect('final storage matches initial', storageEquals(finalSnap, initialSnap));
    expect('final cookie unchanged', finalSnap.cookie === initialSnap.cookie);
    expect('no frameHost iframe remains', document.getElementById('frameHost').children.length === 0);

    // No confirmed fixture location remains in parent storage garden payload
    let gardenSource = null;
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      gardenSource = saved && saved.gardenLocation ? saved.gardenLocation.source : null;
    } catch (e) {
      gardenSource = 'parse_error';
    }
    const initialGardenSource = (function () {
      try {
        const saved = JSON.parse(initialSnap.localStorage[STORAGE_KEY] || 'null');
        return saved && saved.gardenLocation ? saved.gardenLocation.source : null;
      } catch (e) { return null; }
    })();
    expect('gardenLocation source restored to pre-test', gardenSource === initialGardenSource,
      'final=' + gardenSource + ' initial=' + initialGardenSource);

    const failed = results.filter((r) => !r.pass).length;
    recommendation = failed === 0 ? 'READY_FOR_FULL_GOS_3C' : 'NOT_READY';
    logReport('=== performance medians (dev only) ===');
    logReport('iframeBootstrapMedianMs=' + median(perfSamples.iframeBootstrapMs));
    logReport('v1bInvokeMedianMs=' + median(perfSamples.v1bInvokeMs));
    logReport('gosInvokeMedianMs=' + median(perfSamples.gosInvokeMs));
    logReport('comparisonMedianMs=' + median(perfSamples.comparisonMs));
    logReport('fullHarnessDurationMs=' + (performance.now() - harnessStart));
    logReport('recommendation=' + recommendation);
  } catch (err) {
    expect('harness completed without throw', false, String(err && err.stack || err));
    recommendation = 'NOT_READY';
    logReport('FATAL: ' + String(err && err.stack || err));
  } finally {
    try { restoreStorage(initialSnap); } catch (e) {}
    try {
      const host = document.getElementById('frameHost');
      while (host && host.firstChild) host.removeChild(host.firstChild);
    } catch (e) {}
    finish(recommendation);
  }
}

main();
</script>
